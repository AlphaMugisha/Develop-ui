<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body, input, .border, tr, td {
      transition: background-color 0.3s, border-color 0.3s, color 0.3s;
    }
  </style>
</head>

<body class="bg-white text-black">

  <div class="max-w-6xl mx-auto p-4">

    <h1 class="text-lg font-semibold border-b pb-2 mb-4 text-center">
      Users Management
    </h1>

    <div class="flex flex-col md:flex-row gap-4">

      <div class="md:w-1/3 border p-4 rounded-lg h-fit">
        <h2 class="font-bold mb-3 uppercase text-xs tracking-wider">new user</h2>

        <form id="userForm" class="space-y-3">
          <div>
            <label class="text-sm">First Name</label>
            <input type="text" id="firstName" class="w-full border p-2 mt-1 rounded-lg bg-transparent" placeholder="Mugisha" />
            <p id="firstError" class="text-red-500 text-xs mt-1"></p>
          </div>

          <div>
            <label class="text-sm">Last Name</label>
            <input type="text" id="lastName" class="w-full border p-2 mt-1 rounded-lg bg-transparent" placeholder="Alpha" />
            <p id="lastError" class="text-red-500 text-xs mt-1"></p>
          </div>

          <div>
            <label class="text-sm">Gender</label>
            <div class="flex gap-4 mt-1 text-sm">
              <label class="flex items-center gap-1 cursor-pointer">
                <input type="radio" name="gender" value="Male" checked /> Male
              </label>
              <label class="flex items-center gap-1 cursor-pointer">
                <input type="radio" name="gender" value="Female" /> Female
              </label>
            </div>
          </div>

          <div>
            <label class="text-sm">Password</label>
            <input type="password" id="password" class="w-full border p-2 mt-1 rounded-lg bg-transparent" />
          </div>

          <button type="submit" class="bg-blue-600 text-white rounded-lg w-full p-2 mt-2 hover:bg-blue-700 transition-colors font-medium">
            Submit
          </button>

          <p id="successMsg" class="text-green-600 text-sm mt-2 text-center"></p>
        </form>
      </div>

      <div class="md:w-2/3 border p-4 rounded-lg">
        <div class="flex justify-between items-center mb-3">
          <h2 class="font-semibold">Users List</h2>
          <button id="themeToggle" class="bg-black text-white px-4 py-1 rounded text-sm hover:opacity-80 transition-all">
            toggle theme
          </button>
        </div>

        <div class="overflow-x-auto">
          <table class="w-full border text-sm" id="userTable">
            <thead>
              <tr class="border-b bg-gray-50/50">
                <th class="p-2 text-left">#</th>
                <th class="p-2 text-left">First Name</th>
                <th class="p-2 text-left">Last Name</th>
                <th class="p-2 text-left">Gender</th>
                <th class="p-2 text-left">Status</th>
                <th class="p-2 text-left">Action</th>
              </tr>
            </thead>
            <tbody id="userTableBody">
              </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

  <script>
    const form = document.getElementById("userForm");
    const userTableBody = document.getElementById("userTableBody");
    const themeToggle = document.getElementById('themeToggle');
    
    let userCount = 0;

    // --- Dynamic Submit and Add to Table ---
    form.addEventListener("submit", function(e) {
      e.preventDefault();

      const firstName = document.getElementById("firstName").value.trim();
      const lastName = document.getElementById("lastName").value.trim();
      const gender = document.querySelector('input[name="gender"]:checked').value;
      
      const firstError = document.getElementById("firstError");
      const lastError = document.getElementById("lastError");
      const successMsg = document.getElementById("successMsg");

      // Reset
      firstError.textContent = "";
      lastError.textContent = "";
      let isValid = true;

      if (!firstName) { firstError.textContent = "First name is required"; isValid = false; }
      if (!lastName) { lastError.textContent = "Last name is required"; isValid = false; }

      if (isValid) {
        userCount++;
        
        // Create new row
        const row = document.createElement("tr");
        row.className = "border-b hover:bg-gray-500/5 transition-colors";
        row.innerHTML = `
          <td class="p-2">${userCount}</td>
          <td class="p-2">${firstName}</td>
          <td class="p-2">${lastName}</td>
          <td class="p-2">${gender}</td>
          <td class="p-2"><span class="text-green-500 font-medium">Active</span></td>
          <td class="p-2">
            <button class="remove-btn border border-red-500 text-red-500 px-3 py-1 rounded-full text-xs hover:bg-red-500 hover:text-white transition-all">
              Remove
            </button>
          </td>
        `;

        // Add to table
        userTableBody.appendChild(row);

        // Success Feedback
        successMsg.textContent = "User added successfully!";
        form.reset();
        setTimeout(() => successMsg.textContent = "", 3000);
      }
    });

    // --- Dynamic Remove Row (Event Delegation) ---
    userTableBody.addEventListener("click", function(e) {
      if (e.target.classList.contains("remove-btn")) {
        const row = e.target.closest("tr");
        row.remove();
        updateIndices();
      }
    });

    // Function to keep the # column numbers correct after deletion
    function updateIndices() {
      const rows = userTableBody.querySelectorAll("tr");
      userCount = rows.length;
      rows.forEach((row, index) => {
        row.cells[0].textContent = index + 1;
      });
    }

    // --- Theme Toggle Logic ---
    themeToggle.addEventListener('click', () => {
      const isDark = document.body.classList.toggle('bg-gray-900');
      document.body.classList.toggle('text-white');
      
      if (isDark) {
        themeToggle.classList.replace('bg-black', 'bg-white');
        themeToggle.classList.replace('text-white', 'text-black');
        document.querySelectorAll('.border').forEach(el => el.classList.add('border-gray-700'));
      } else {
        themeToggle.classList.replace('bg-white', 'bg-black');
        themeToggle.classList.replace('text-black', 'text-white');
        document.querySelectorAll('.border').forEach(el => el.classList.remove('border-gray-700'));
      }
    });
  </script>

</body>
</html>
